spring.application.name=smt
server.port=8090

# ================= DATABASE =================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AVIRATTECH;encrypt=true;trustServerCertificate=true
spring.datasource.username=victus
spring.datasource.password=root

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# (Optional but safe)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect