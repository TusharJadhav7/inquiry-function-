spring.application.name=smt
server.port=8091

# ================= DATABASE =================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AVIRATTECH;encrypt=true;trustServerCertificate=true
spring.datasource.username=tushar
spring.datasource.password=root

# ================= JPA =================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# (Optional but safe)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36}:%L - %msg%n
logging.level.com.avirat.tech.smt=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE